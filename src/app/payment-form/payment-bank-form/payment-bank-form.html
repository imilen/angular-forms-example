@let country = bankForm().bCountry;
@let address = bankForm().bAddress;
@let postCode = bankForm().bPostCode;
@let city = bankForm().bCity;
@let name = bankForm().bName;

<app-input-wrapper
  [field]="country"
  autocomplete="country-name"
  placeholder="country" />
<app-input-wrapper
  [field]="address"
  autocomplete="street-address"
  placeholder="address" />
<app-input-wrapper
  [field]="postCode"
  autocomplete="postal-code"
  placeholder="postCode" />
<app-input-wrapper
  [field]="city"
  autocomplete="address-level2"
  placeholder="city" />
<app-input-wrapper
  [field]="name"
  autocomplete="name"
  placeholder="name" />
