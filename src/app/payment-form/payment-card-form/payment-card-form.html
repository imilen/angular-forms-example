@let holder = cardForm().cHolder;
@let number = cardForm().cNumber;
@let expirationDate = cardForm().cExpirationDate;
@let cvc = cardForm().cCvc;

<!-- ------------------------------- holder -------------------------------- -->
<app-input-wrapper
  [field]="holder"
  autocomplete="cc-name"
  placeholder="holder" />
<!-- ------------------------------- number -------------------------------- -->
<app-input-wrapper
  [field]="number"
  inputmode="numeric"
  autocomplete="cc-number"
  placeholder="number" />
<div class="flex items-start gap-8">
  <!-- --------------------------- expirationDate ---------------------------- -->
  <app-input-wrapper
    [field]="expirationDate"
    type="date"
    autocomplete="cc-exp" />
  <!-- --------------------------------- cvc --------------------------------- -->
  <app-input-wrapper
    [field]="cvc"
    type="password"
    inputmode="numeric"
    autocomplete="cc-csc"
    placeholder="cvc"
    [rules]="cart.CVC_RULES" />
</div>
